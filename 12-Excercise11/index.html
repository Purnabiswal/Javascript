  <body>
    <!--
     Write a program to calculate factorial of a number using reduce and using for loops
     
        6! = 6*5*4*3*2*1
 -->


    <script>
        
        //Using reduce
        let a=[1,2,3,4,5,6];

        let ans=a.reduce((a,b)=>{
            return a*b;
        })

        console.log(ans);
        

        //Using loop
        let num=prompt("Enter a num")
        let ans2=1;
        for (let i = 1; i <= num; i++) {
            ans2*=i;
        }

        console.log(ans2);
        



    </script>
  </body>
